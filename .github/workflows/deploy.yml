# Runs `npm run build` and publishes ./dist (Vite output).
# Do NOT use the "Static HTML" suggested workflow — that deploys the repo root
# without building, so the live site keeps /src/main.jsx and breaks.
#
# Pages: Settings → Build and deployment → Source → GitHub Actions.
# First run: Actions → this workflow → Run workflow (or push to main).

name: Build Vite app and deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist is a Vite build (not dev index.html)
        run: |
          if grep -q 'src/main.jsx' dist/index.html; then
            echo 'ERROR: dist/index.html still references /src/main.jsx — build misconfigured.'
            exit 1
          fi
          if ! grep -q 'assets/index-' dist/index.html; then
            echo 'ERROR: dist/index.html missing bundled assets/index-*.js — check vite build.'
            exit 1
          fi
          head -n 20 dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
